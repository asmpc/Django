{% extends "base.html" %}

{% load crispy_forms_tags %}


{% block content %}

<div class="container mt-4" style="max-width: 600px;">

    <h3>Форма создания тэгов</h3>

    <form action="{% url 'create_tag' %}" method="post">
        {% csrf_token %}

        <div class="mb-3">
            {{ form|crispy }}
        </div>

        <button type="submit" class="btn btn-primary">Создать тэг</button>
    </form>

</div>
