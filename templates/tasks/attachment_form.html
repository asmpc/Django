{% extends "base.html" %}
{% load static %}
{% load crispy_forms_tags %}


{% block content %}

<div class="container mt-4" style="max-width: 600px;">

    <h3>Форма создания вложения</h3>

    <form enctype="multipart/form-data"
          action="{% url 'create_attachment' %}"
          method="post">

        {% csrf_token %}

        <div class="mb-3">
            {{ form|crispy }}
        </div>
        <p class="text-muted">
    Допустимы изображения и PDF до 5 МБ
</p>
        <button type="submit" class="btn btn-primary w-100 mt-2">
            Добавить вложение
        </button>

    </form>

</div>
