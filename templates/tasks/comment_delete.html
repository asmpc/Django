{% extends "base.html" %}

{% block content %}

<h3>Удаление комментария</h3>

<p>Вы уверены, что хотите удалить этот комментарий?</p>

<hr>

<p><strong>Комментарий:</strong> {{ object.message }}</p>
<p><strong>Пользователь:</strong> {{ object.user }}</p>
<p><strong>Задача:</strong> {{ object.task }}</p>

<form method="post">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">
        Удалить
    </button>

    <a href="{% url 'urequest' object.user_id %}" class="btn btn-secondary">
        Отмена
    </a>
</form>

{% endblock %}
